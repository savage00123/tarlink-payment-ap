<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink Zimbabwe Reseller Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700">
        <div class="text-center mb-8">
            <div class="inline-block bg-blue-600 text-white p-3 rounded-full mb-3 shadow-lg shadow-blue-500/30">
                📡
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Starlink Zimbabwe</h1>
            <p class="text-slate-400 text-sm mt-1">Authorized Reseller Activation Gateway</p>
        </div>

        <div id="statusBanner" class="hidden mb-6 p-4 rounded-xl text-sm font-medium text-center"></div>

        <form id="paymentForm" class="space-y-5">
            
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">EcoCash Subscriber Number</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">+263</span>
                    <input type="tel" id="phone" required placeholder="771234567" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-16 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Choose Your Subscription Tier</label>
                <select id="planId" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm appearance-none">
                    <option value="" disabled selected>Select a plan...</option>
                    <option value="residential">Standard Residential — $30/mo</option>
                    <option value="roam">Regional Roam (Travel) — $50/mo</option>
                    <option value="business">Priority Business — $100/mo</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Target Distribution Province/Region</label>
                <select id="location" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
                    <option value="" disabled selected>Select your region...</option>
                    <option value="Harare">Harare</option>
                    <option value="Bulawayo">Bulawayo</option>
                    <option value="Manicaland">Manicaland</option>
                    <option value="Mashonaland Central">Mashonaland Central</option>
                    <option value="Mashonaland East">Mashonaland East</option>
                    <option value="Mashonaland West">Mashonaland West</option>
                    <option value="Masvingo">Masvingo</option>
                    <option value="Matabeleland North">Matabeleland North</option>
                    <option value="Matabeleland South">Matabeleland South</option>
                    <option value="Midlands">Midlands</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Assigned Fulfillment Administrator</label>
                <input type="text" id="agent" required placeholder="e.g. Agent Admin / Portal" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">EcoCash Confirmation SMS Content</label>
                <textarea id="paymentCodeString" required rows="3" placeholder="Paste the full EcoCash approval message here..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm resize-none"></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all duration-150 transform active:scale-[0.98] text-sm mt-2">
                Verify & Activate Connection
            </button>
        </form>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const banner = document.getElementById('statusBanner');
            
            // UI Loading State
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing Verification Matrix...";
            banner.classList.add('hidden');

            // Gather inputs matching backend Pydantic fields
            const payload = {
                phone: document.getElementById('phone').value.trim(),
                location: document.getElementById('location').value,
                planId: document.getElementById('planId').value,
                agent: document.getElementById('agent').value.trim(),
                paymentCodeString: document.getElementById('paymentCodeString').value.trim()
            };

            try {
                // Using a safe relative URL path for unified Render environment execution
                const response = await fetch('/api/ecocash/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    banner.className = "mb-6 p-4 rounded-xl text-sm font-medium text-center bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                    banner.innerText = "✅ Success! Verification complete. Telemetry data dispatched to Telegram.";
                    document.getElementById('paymentForm').reset();
                } else {
                    throw new Error(result.detail || "Server pipeline error during fulfillment verification.");
                }

            } catch (error) {
                banner.className = "mb-6 p-4 rounded-xl text-sm font-medium text-center bg-rose-500/10 text-rose-400 border border-rose-500/20";
                banner.innerText = `❌ Error: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Verify & Activate Connection";
                banner.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
